        .glass-card {
            background: rgba(31, 31, 37, 0.6);
            backdrop-filter: blur(20px);
        }
        .glow-button:hover {
            box-shadow: 0 0 24px rgba(0, 102, 255, 0.15);

<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary">
<!-- Auth Background with Watermark -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0 flex items-center justify-center">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container/10 via-surface/80 to-surface"></div>
<div class="text-[20rem] font-headline font-black italic tracking-tighter text-white/[0.02] select-none transform -rotate-12">
            KCM
        </div>
</div>
<!-- Main Content -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 sm:p-8">
<!-- Header / Logo -->
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl font-black italic tracking-tighter text-blue-600 dark:text-blue-500">
                KCM PICKS
            </h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium tracking-wide uppercase">Elite Sports Analytics</p>
</div>
<!-- Auth Card -->
<div class="glass-card w-full max-w-md p-8 rounded-xl border border-white/5 shadow-2xl shadow-black/50">
<div class="flex flex-col space-y-8">
<!-- Title -->
<div class="space-y-1">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-primary-container">Welcome Back</h2>
<p class="text-on-surface-variant text-sm">Enter your credentials to access the arena.</p>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="return false">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant px-1" for="email">Email</label>
<div class="input-glow flex items-center bg-surface-container-lowest border border-outline-variant/30 rounded-xl px-4 py-3.5 transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant text-lg mr-3">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline/50 text-sm" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="input-glow flex items-center bg-surface-container-lowest border border-outline-variant/30 rounded-xl px-4 py-3.5 transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant text-lg mr-3">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline/50 text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit -->
<button class="glow-button w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg transition-all duration-300 active:scale-95 mt-4" type="submit">
                        SIGN IN TO ARENA
                    </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-widest text-outline">Or connect with</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-3 gap-4">
<!-- Google -->
<button class="flex items-center justify-center p-3.5 rounded-xl bg-white/[0.03] border border-white/5 hover:bg-white/[0.08] transition-all duration-300 group">
<img alt="Google" class="w-5 h-5 opacity-80 group-hover:opacity-100" data-alt="Official Google logo with signature colors on a transparent background for authentication button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLV1-yfSEp-1Hzru6pcfouO-RIeAkZdzU1pNfI1g7HoR0wgbcEA2b9sHdSpnhQLM9Ma8aiR6K5zoUn_ts429Ah2TAyaAkrNB1bKqAZUPoeN3jpyIFihDHa8IwXfTAmPdDfZWmAGxngTTcKWVh8KY5cW_f47nuJiy2vC2Yy0NCBfXMoTbO3Qkxc0vraqCkEMqQzPMm0M37TpcrDgoQJoBDfvjiNet1nmEFlatztWTzxNY0bp3jABxYqJ3_poRMfuEBi__eVegC_o4co"/>
</button>

</button>
<!-- Discord -->

</button>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                New to the platform? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Create an account</a>
</p>
</div>
<!-- Compliance Mini-text -->
<div class="mt-auto pt-12 pb-4 text-center">
<p class="text-[10px] text-outline font-medium tracking-tighter uppercase opacity-50 max-w-xs mx-auto">
                By entering, you agree to our Terms of Battle and Privacy Protocol. 21+ Only.
            </p>
</div>
</main>
<!-- Visual Accents for Digital Arena feel -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-tertiary to-purple-600 opacity-30 z-50"></div>
<div class="fixed bottom-0 left-0 w-full h-[265px] bg-gradient-to-t from-primary-container/5 to-transparent pointer-events-none"></div>
</body></html>
